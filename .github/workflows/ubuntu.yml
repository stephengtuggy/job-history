name: "Ubuntu"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      contents: read

    env:
      JOB_HISTORY_SECRET_KEY: "${{ secrets.JOB_HISTORY_SECRET_KEY }}"
      JOB_HISTORY_ALLOWED_HOSTS: '0.0.0.0'
      JOB_HISTORY_DB_NAME: '/data/job_history.sqlite3'
      JOB_HISTORY_DEBUG: false
      JOB_HISTORY_STATIC_ROOT: '/usr/local/src/app/static/'
      JOB_HISTORY_STATIC_URL: '/app/static/'

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - run: mv docker-compose.ci.yml docker-compose.yml

    - run: docker compose up --build --exit-code-from web --abort-on-container-exit
